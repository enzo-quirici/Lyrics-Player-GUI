<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pear Music Animated Lyrics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bg-overlay"></div>
    <div id="bg-image"></div>

    <div class="controls-panel">
        <div class="control-group">
            <label for="host-input">API Host:</label>
            <input type="text" id="host-input" value="127.0.0.1" placeholder="192.168.1.10" spellcheck="false">
        </div>
        <div class="control-group">
            <label for="port-input">API Port:</label>
            <input type="number" id="port-input" value="26538" min="1" max="65535">
        </div>
        <div class="control-group">
            <label for="sync-offset-input" title="Positive = lyrics earlier">Lead (s):</label>
            <input type="number" id="sync-offset-input" value="1" step="0.1" min="-3" max="5">
        </div>
        <hr class="panel-divider">
        <div class="control-group">
            <label class="custom-file-upload">
                <input type="file" id="bg-input" accept="image/*">
                Custom Background
            </label>
        </div>
        <hr class="panel-divider">
        <div class="control-group">
            <label>Show Debug Info</label>
            <input type="checkbox" id="debug-toggle">
        </div>
        <div id="debug-terminal" class="hidden">
            <div class="terminal-title">Raw JSON Payload Console:</div>
            <pre id="json-viewer">Awaiting data stream...</pre>
        </div>
    </div>

    <div class="lyrics-container">
        <div id="lyrics-target"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
